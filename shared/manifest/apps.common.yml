# Shared application manifest
# Declares intent for applications with OS-specific package manager mappings

apps:
  # Terminal emulators
  - name: alacritty
    arch:
      source: pacman
      package: alacritty
    darwin:
      source: brew
      package: alacritty
    windows:
      source: winget
      package: alacritty

  # GUI applications
  - name: gimp
    arch:
      source: pacman
      package: gimp
    darwin:
      source: brew
      package: gimp
    windows:
      source: winget
      package: GIMP.GIMP

  # Editors
  # Development tools

